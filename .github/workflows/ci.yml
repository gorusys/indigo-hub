# CI: link check, lint (optional), code lab check
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs and link checker
        run: |
          pip install mkdocs-material mkdocs-linkcheck

      - name: Build with link check
        env:
          INDIGO_CHAT_EMBED_URL: https://indigo-hub-ai.vercel.app/embed
        run: mkdocs build --strict
        continue-on-error: true  # linkcheck can fail on external URLs; fix or remove when stable

  code-labs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install code lab deps (mint-iusd)
        run: |
          cd code-labs/mint-iusd && npm install --no-save 2>/dev/null || true
        continue-on-error: true  # SDK may not be published yet

      - name: TypeScript check (mint-iusd)
        run: |
          cd code-labs/mint-iusd && npx tsc --noEmit 2>/dev/null || true
        continue-on-error: true

  ai-chat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ai-chat/package-lock.json

      - name: Install and build Indigo Hub AI chat (Next.js)
        working-directory: ai-chat
        run: |
          npm ci
          npm run build
